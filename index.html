<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Pakuranga College — Daily Notices</title>
  <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@700;900&family=Source+Sans+3:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #ffffff;
      font-family: 'Source Sans 3', sans-serif;
    }

    .page {
      display: flex;
      flex-direction: column;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }

    /* ── HEADER ── */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #034258;
      border-bottom: 4px solid #6dbecb;
      padding: 0 3vw;
      height: 10vh;
      flex-shrink: 0;
      width: 100%;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 1.2vw;
    }

    .logo-ring {
      width: 7vh;
      height: 7vh;
      border-radius: 50%;
      background: #6dbecb;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .logo-ring img {
      width: 6vh;
      height: 6vh;
      object-fit: contain;
      border-radius: 50%;
    }

    .school-name {
      font-family: 'Merriweather', serif;
      font-size: 2.8vh;
      font-weight: 900;
      color: #ffffff;
      letter-spacing: 0.5px;
      line-height: 1;
    }
    .school-name .sub {
      display: block;
      font-family: 'Source Sans 3', sans-serif;
      font-size: 1.1vh;
      font-weight: 700;
      color: #6dbecb;
      letter-spacing: 4px;
      text-transform: uppercase;
      margin-top: 0.6vh;
    }

    .header-right {
      text-align: right;
    }
    .header-time {
      font-family: 'Merriweather', serif;
      font-size: 3.8vh;
      font-weight: 900;
      color: #ffffff;
      line-height: 1;
    }
    .header-date {
      font-size: 1.4vh;
      font-weight: 600;
      color: #6dbecb;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-top: 0.6vh;
    }

    /* ── FEED ── */
    .feed {
      flex: 1;
      overflow: hidden;
      background: #ffffff;
      width: 100%;
      position: relative;
    }
    .feed iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100% !important;
      height: 100% !important;
      border: none;
      display: block;
    }
  </style>
</head>

<script>
  const DAYS   = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

  function updateClock() {
    const now = new Date();
    const hh  = String(now.getHours()).padStart(2, '0');
    const mm  = String(now.getMinutes()).padStart(2, '0');
    const ss  = String(now.getSeconds()).padStart(2, '0');
    document.getElementById('clock').textContent = hh + ':' + mm + ':' + ss;
    document.getElementById('date-display').textContent =
      DAYS[now.getDay()] + ' ' + now.getDate() + ' ' + MONTHS[now.getMonth()] + ' ' + now.getFullYear();
  }

  updateClock();
  setInterval(updateClock, 1000);
</script>
