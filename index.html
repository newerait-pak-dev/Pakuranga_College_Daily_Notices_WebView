<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1920, initial-scale=1.0" />
  <meta http-equiv="refresh" content="300" />
  <title>Pakuranga College — Daily Notices</title>
  <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@700;900&family=Source+Sans+3:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --teal:  #6dbecb;
      --navy:  #034258;
      --white: #ffffff;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 1920px;
      height: 1080px;
      overflow: hidden;
      font-family: 'Source Sans 3', sans-serif;
      background: var(--navy);
    }

    .page {
      display: grid;
      grid-template-columns: 290px 1fr;
      width: 1920px;
      height: 1080px;
      overflow: hidden;
    }

    /* ── SIDEBAR ── */
    .sidebar {
      background: var(--navy);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 32px;
      padding: 48px 24px;
      border-right: 5px solid var(--teal);
      position: relative;
    }
    .sidebar::before,
    .sidebar::after {
      content: '';
      position: absolute;
      left: 0; right: 0;
      height: 5px;
      background: var(--teal);
    }
    .sidebar::before { top: 0; }
    .sidebar::after  { bottom: 0; }

    .logo-ring {
      width: 190px;
      height: 190px;
      border-radius: 50%;
      background: var(--teal);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 0 6px rgba(109,190,203,0.3), 0 0 50px rgba(109,190,203,0.2);
      flex-shrink: 0;
    }
    .logo-ring img {
      width: 162px;
      height: 162px;
      object-fit: contain;
      border-radius: 50%;
      background: var(--teal);
    }

    .school-name {
      font-family: 'Merriweather', serif;
      font-size: 25px;
      font-weight: 900;
      color: var(--white);
      text-align: center;
      line-height: 1.3;
    }
    .school-name .sub {
      display: block;
      font-family: 'Source Sans 3', sans-serif;
      font-size: 11px;
      font-weight: 700;
      color: var(--teal);
      letter-spacing: 4px;
      text-transform: uppercase;
      margin-top: 10px;
    }

    .rule {
      width: 50px;
      height: 3px;
      background: var(--teal);
      border-radius: 2px;
    }

    .live-badge {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      font-weight: 700;
      color: var(--teal);
      letter-spacing: 3px;
      text-transform: uppercase;
    }
    .live-dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: var(--teal);
      animation: blink 2.5s ease-in-out infinite;
    }
    @keyframes blink {
      0%,100% { opacity:1; }
      50%      { opacity:0.2; }
    }

    /* ── MAIN ── */
    .main {
      display: flex;
      flex-direction: column;
      background: var(--teal);
      overflow: hidden;
    }

    .header {
      background: var(--navy);
      padding: 22px 52px;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-shrink: 0;
      border-bottom: 4px solid var(--teal);
    }
    .header h1 {
      font-family: 'Merriweather', serif;
      font-size: 30px;
      font-weight: 900;
      color: var(--white);
      letter-spacing: 0.5px;
    }
    .header h1 em {
      font-style: normal;
      color: var(--teal);
    }

    .widget-area {
      flex: 1;
      overflow: hidden;
      background: #fff;
      display: flex;
    }
    .widget-area iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }

    .bottom-bar {
      height: 42px;
      background: var(--navy);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 52px;
      flex-shrink: 0;
      border-top: 3px solid var(--teal);
    }
    .bottom-bar .left {
      font-size: 11px;
      color: rgba(109,190,203,0.7);
      letter-spacing: 2px;
      text-transform: uppercase;
    }
    .bottom-bar .right {
      font-size: 11px;
      color: rgba(109,190,203,0.4);
      letter-spacing: 2px;
      text-transform: uppercase;
    }
  </style>
</head>
